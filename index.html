<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sleek Beauty Parlour — The Look Book</title>
<meta name="description" content="Our nail gallery — find your next look at Sleek Beauty Parlour." />
<meta name="theme-color" content="#5b2d8e" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<meta property="og:title" content="Sleek Beauty Parlour — The Look Book" />
<meta property="og:description" content="Our nail gallery — find your next look." />
<meta property="og:image" content="assets/logo-white.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Dancing+Script:wght@500;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --purple-deep:#5b2d8e; --purple:#7b4ab8; --orange:#e8714a;
    --pink:#e05b8a; --pink-soft:#f7b9cf; --blue:#4a90c4;
    --cream:#fffaf0; --ink:#42334f; --muted:#9a8aa8; --line:#f0e3ef;
    --grad:linear-gradient(90deg,var(--orange),var(--pink),var(--purple),var(--blue));
    --shadow:0 12px 30px rgba(123,74,184,.14);
    --shadow-lift:0 22px 48px rgba(123,74,184,.30);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Work Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);
    min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    background:linear-gradient(135deg,#fff5f9,#fdeef7,#f4ecfc,#fff3ec,#fdeef7);
    background-size:300% 300%;animation:bgshift 26s ease infinite;
  }
  @keyframes bgshift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px;position:relative;z-index:3}

  /* floating petals */
  .petals{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
  .petal{position:absolute;bottom:-60px;opacity:0;animation:float-up linear infinite}
  @keyframes float-up{
    0%{transform:translateY(0) rotate(0);opacity:0}
    10%{opacity:.5}
    90%{opacity:.5}
    100%{transform:translateY(-115vh) rotate(360deg);opacity:0}
  }

  /* corner florals */
  .floral{position:fixed;pointer-events:none;z-index:0;opacity:.85}
  .floral.tl{top:-40px;left:-50px;width:min(260px,40vw);transform:rotate(4deg)}
  .floral.br{bottom:-50px;right:-50px;width:min(280px,44vw);transform:rotate(186deg)}
  @media(max-width:560px){.floral{width:44vw;opacity:.7}}

  /* header */
  header{text-align:center;padding:36px 18px 8px}
  header .logo{width:min(230px,58vw);height:auto;filter:drop-shadow(0 8px 16px rgba(123,74,184,.20));animation:bob 5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .lookbook{
    font-family:'Fraunces',serif;font-weight:600;font-style:italic;
    font-size:clamp(2.4rem,9vw,4rem);letter-spacing:.5px;margin:8px 0 2px;
    background:linear-gradient(90deg,var(--purple-deep),var(--pink),var(--orange),var(--purple),var(--purple-deep));
    background-size:250% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shimmer 8s linear infinite;
  }
  @keyframes shimmer{to{background-position:250% center}}
  .lotus{display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 4px;color:var(--orange);font-size:1.1rem}
  .lotus::before,.lotus::after{content:"";height:1.5px;width:70px;background:linear-gradient(90deg,transparent,var(--pink))}
  .lotus::after{background:linear-gradient(90deg,var(--pink),transparent)}
  .tagline{font-family:'Dancing Script',cursive;font-size:1.5rem;color:var(--purple);margin:2px 0 0}

  /* favourites toggle */
  .toolbar{display:flex;justify-content:center;margin:22px 0 4px}
  .favbtn{
    border:1.5px solid var(--line);background:#fff;color:var(--pink);cursor:pointer;border-radius:999px;
    padding:9px 20px;font-size:.92rem;font-weight:700;display:inline-flex;align-items:center;gap:8px;
    box-shadow:0 4px 14px rgba(123,74,184,.08);transition:all .18s ease;
  }
  .favbtn:hover{transform:translateY(-2px);border-color:var(--pink)}
  .favbtn.active{background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;border-color:transparent;box-shadow:var(--shadow)}
  .favbtn .ct{font-weight:600;opacity:.9}

  /* gallery */
  .board{columns:4 250px;column-gap:18px;padding:20px 4px 30px}
  @media(max-width:980px){.board{columns:3 210px}}
  @media(max-width:620px){.board{columns:2 160px;column-gap:13px}}
  .card{
    position:relative;break-inside:avoid;margin:0 0 18px;border-radius:20px;overflow:hidden;background:#fff;
    box-shadow:var(--shadow);cursor:pointer;
    opacity:0;transform:translateY(26px) scale(.97);
    transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1),box-shadow .25s ease;
  }
  .card.in{opacity:1;transform:none}
  .card:hover{box-shadow:var(--shadow-lift);transform:translateY(-5px)}
  .card .imgwrap{overflow:hidden}
  .card img{width:100%;display:block;background:linear-gradient(135deg,#fde7f1,#efe5fb);transition:transform .5s ease}
  .card:hover img{transform:scale(1.07)}
  .card .cap{
    position:absolute;left:0;right:0;bottom:0;padding:32px 14px 12px;color:#fff;
    font-family:'Dancing Script',cursive;font-size:1.12rem;letter-spacing:.02em;
    background:linear-gradient(to top,rgba(66,40,90,.82),transparent);
    transform:translateY(6px);opacity:0;transition:all .25s ease;
  }
  .card:hover .cap{opacity:1;transform:none}
  .heart{
    position:absolute;top:10px;right:10px;width:36px;height:36px;border:none;border-radius:50%;cursor:pointer;
    background:rgba(255,255,255,.86);backdrop-filter:blur(4px);display:grid;place-items:center;
    font-size:1.1rem;line-height:1;color:var(--pink);box-shadow:0 3px 8px rgba(0,0,0,.14);
    transition:transform .15s ease,background .15s ease;z-index:2;
  }
  .heart:hover{transform:scale(1.14)}
  .heart.on{background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff}
  .heart.pop{animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.45)}100%{transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){
    .card{opacity:1;transform:none;transition:none}
    body,header .logo,.lookbook,.petal{animation:none}
  }

  .empty{text-align:center;color:var(--muted);padding:54px 20px;font-family:'Dancing Script',cursive;font-size:1.5rem}
  .empty strong{display:block;font-family:'Fraunces',serif;font-style:italic;color:var(--purple-deep);font-size:1.5rem;margin-bottom:6px}

  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(50,25,65,.92);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;z-index:60}
  .lb.open{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .lb-card{background:#fff;border-radius:20px;padding:12px;max-width:min(94vw,620px);box-shadow:0 30px 80px rgba(0,0,0,.55);animation:lift .3s cubic-bezier(.2,.8,.2,1);position:relative}
  @keyframes lift{from{transform:scale(.9) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .lb-card img{width:100%;max-height:72vh;object-fit:contain;display:block;border-radius:12px;background:#faf3fb}
  .lb-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 8px 4px}
  .lb-meta .who{font-family:'Dancing Script',cursive;font-size:1.4rem;color:var(--purple-deep)}
  .lb-heart{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 16px;font-weight:700;color:var(--pink);cursor:pointer;font-size:.92rem;white-space:nowrap}
  .lb-heart.on{background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;border-color:transparent}
  .lb button.nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);border:none;color:#fff;font-size:2rem;width:56px;height:56px;border-radius:50%;cursor:pointer;transition:background .15s ease}
  .lb button.nav:hover{background:rgba(255,255,255,.32)}
  .lb .prev{left:-74px}.lb .next{right:-74px}
  @media(max-width:820px){.lb .prev{left:8px}.lb .next{right:8px}.lb button.nav{width:46px;height:46px;font-size:1.5rem;background:rgba(0,0,0,.32)}}
  .lb .close{position:fixed;top:18px;right:20px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:1.5rem;width:48px;height:48px;border-radius:50%;cursor:pointer}
  .lb .counter{position:fixed;top:24px;left:24px;color:#fff;font-size:.85rem;letter-spacing:.1em;opacity:.8}

  /* qr + footer */
  .qrband{margin:14px auto 28px;max-width:780px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;
    background:linear-gradient(135deg,#fff,#fdeef6);border:1px solid var(--line);border-radius:24px;padding:22px 28px;box-shadow:var(--shadow)}
  .qrband img{width:108px;height:108px;border-radius:12px;background:#fff;padding:6px;box-shadow:0 6px 14px rgba(123,74,184,.12)}
  .qrband .txt{text-align:left}
  .qrband .scan{font-family:'Dancing Script',cursive;color:var(--pink);font-size:1.4rem}
  .qrband .full{font-family:'Fraunces',serif;font-style:italic;font-size:1.35rem;color:var(--purple-deep);margin:2px 0}
  .qrband .insp{color:var(--muted);font-size:.9rem}
  footer{text-align:center;padding:0 18px 38px}
  .book{display:inline-block;margin:4px 0 22px;padding:14px 34px;border-radius:999px;background:var(--grad);background-size:200% 100%;color:#fff;font-weight:700;text-decoration:none;box-shadow:var(--shadow);transition:background-position .4s ease,transform .18s ease}
  .book:hover{background-position:100% 0;transform:translateY(-2px)}
  .ribbon{background:var(--purple-deep);color:#fff;text-align:center;padding:15px;font-family:'Fraunces',serif;font-style:italic;letter-spacing:.12em;font-size:.95rem;position:relative;z-index:3}
  .ribbon span{color:var(--pink-soft)}
</style>
</head>
<body>
  <div class="petals" id="petals" aria-hidden="true"></div>
  <svg class="floral tl" viewBox="0 0 200 200" aria-hidden="true"><use href="#bloom"/></svg>
  <svg class="floral br" viewBox="0 0 200 200" aria-hidden="true"><use href="#bloom"/></svg>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <radialGradient id="pf" cx="50%" cy="40%" r="65%"><stop offset="0%" stop-color="#fff"/><stop offset="55%" stop-color="#f7b9cf"/><stop offset="100%" stop-color="#e05b8a"/></radialGradient>
    <radialGradient id="pf2" cx="50%" cy="40%" r="65%"><stop offset="0%" stop-color="#fbe3f0"/><stop offset="60%" stop-color="#c98ad6"/><stop offset="100%" stop-color="#7b4ab8"/></radialGradient>
    <linearGradient id="lf" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b89cdc"/><stop offset="100%" stop-color="#7b4ab8"/></linearGradient>
    <g id="leaf"><path d="M0,0 C18,-12 40,-10 54,6 C36,10 14,12 0,0 Z" fill="url(#lf)" opacity=".75"/></g>
    <g id="petal1"><ellipse cx="0" cy="-30" rx="16" ry="30" fill="url(#pf)"/></g>
    <g id="bloom">
      <g transform="translate(86,150)"><use href="#leaf" transform="rotate(-150) scale(1.1)"/><use href="#leaf" transform="rotate(-110) scale(.9)"/><use href="#leaf" transform="rotate(120)"/></g>
      <g transform="translate(70,70)">
        <ellipse cx="0" cy="-34" rx="20" ry="34" fill="url(#pf2)"/><ellipse cx="0" cy="-34" rx="20" ry="34" fill="url(#pf2)" transform="rotate(72)"/><ellipse cx="0" cy="-34" rx="20" ry="34" fill="url(#pf2)" transform="rotate(144)"/><ellipse cx="0" cy="-34" rx="20" ry="34" fill="url(#pf2)" transform="rotate(216)"/><ellipse cx="0" cy="-34" rx="20" ry="34" fill="url(#pf2)" transform="rotate(288)"/><circle r="13" fill="#f0a93e"/><circle r="7" fill="#e8714a"/>
      </g>
      <g transform="translate(122,108) scale(.78)">
        <ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pf)" transform="rotate(20)"/><ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pf)" transform="rotate(92)"/><ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pf)" transform="rotate(164)"/><ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pf)" transform="rotate(236)"/><ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pf)" transform="rotate(308)"/><circle r="12" fill="#f0a93e"/><circle r="6" fill="#e8714a"/>
      </g>
    </g>
  </defs></svg>

  <header>
    <div class="wrap">
      <img class="logo" src="assets/logo.png?v=2" alt="Sleek Beauty Parlour" />
      <h1 class="lookbook">The Look Book</h1>
      <div class="lotus">❀</div>
      <p class="tagline">Real nails. Real results. Real you.</p>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar"><button class="favbtn" id="favToggle"><span>♥</span> Favourites <span class="ct" id="favCount"></span></button></div>
    <div class="board" id="board"></div>
    <p class="empty" id="empty" style="display:none"></p>

    <div class="qrband">
      <img src="qr/sleek-lookbook-qr.png" alt="Scan QR" />
      <div class="txt">
        <div class="scan">Scan to explore</div>
        <div class="full">our full Nail Gallery</div>
        <div class="insp">Inspiration for your next look ❤</div>
      </div>
    </div>
    <footer><a class="book" id="bookBtn" href="#">Book your appointment</a></footer>
  </div>

  <div class="ribbon">SLEEK BEAUTY PARLOUR <span>•</span> NAILS THAT SPEAK ELEGANCE</div>

  <div class="lb" id="lb">
    <div class="counter" id="lbCounter"></div>
    <button class="close" id="lbClose" aria-label="Close">×</button>
    <button class="nav prev" id="lbPrev" aria-label="Previous">‹</button>
    <div class="lb-card">
      <img id="lbImg" src="" alt="" />
      <div class="lb-meta">
        <span class="who" id="lbWho"></span>
        <button class="lb-heart" id="lbHeart">♥ Save look</button>
      </div>
    </div>
    <button class="nav next" id="lbNext" aria-label="Next">›</button>
  </div>

<script>
const $ = id => document.getElementById(id);
let PHOTOS=[], CONFIG={}, current=[], lbIndex=0, favOnly=false;
const FAVS=new Set(JSON.parse(localStorage.getItem("sleek_favs")||"[]"));
const saveFavs=()=>localStorage.setItem("sleek_favs",JSON.stringify([...FAVS]));

/* floating petals */
(function makePetals(){
  const box=$('petals'); const colors=["#f7b9cf","#e05b8a","#c98ad6","#f0a93e"];
  for(let i=0;i<10;i++){
    const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
    s.setAttribute("viewBox","-20 -34 40 40"); s.classList.add("petal");
    const sz=14+Math.random()*22;
    s.style.width=sz+"px"; s.style.left=(Math.random()*100)+"vw";
    s.style.animationDuration=(16+Math.random()*16)+"s";
    s.style.animationDelay=(-Math.random()*22)+"s";
    s.innerHTML=`<ellipse cx="0" cy="-16" rx="9" ry="16" fill="${colors[i%colors.length]}" opacity="0.85"/>`;
    box.appendChild(s);
  }
})();

const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
},{rootMargin:"0px 0px -8% 0px"});

fetch('photos.json?v='+Date.now())
  .then(r=>r.ok?r.json():Promise.reject())
  .then(d=>{
    PHOTOS=(d.photos||[]).filter(p=>p.src); CONFIG=d.config||{};
    if(CONFIG.bookingUrl) $('bookBtn').href=CONFIG.bookingUrl; else $('bookBtn').style.display='none';
    render();
  })
  .catch(()=>{ $('empty').style.display='block'; $('empty').innerHTML='<strong>Coming soon</strong>Our nail gallery is being set up 💅'; });

function render(){
  $('favToggle').classList.toggle('active',favOnly);
  $('favCount').textContent=FAVS.size?`(${FAVS.size})`:"";
  current = favOnly ? PHOTOS.filter(p=>FAVS.has(p.src)) : PHOTOS;
  const board=$('board'), empty=$('empty'); board.innerHTML="";
  if(!current.length){
    empty.style.display="block";
    empty.innerHTML = favOnly ? '<strong>No saved looks yet</strong>Tap the ♥ on any photo to save it here.'
                              : '<strong>Coming soon</strong>New looks on the way 💕';
    return;
  }
  empty.style.display="none";
  current.forEach((p,i)=>{
    const card=document.createElement('div'); card.className='card';
    card.style.transitionDelay=(Math.min(i,12)*0.04)+'s';
    card.innerHTML =
      `<button class="heart ${FAVS.has(p.src)?'on':''}" aria-label="Save">♥</button>`+
      `<div class="imgwrap"><img loading="lazy" src="${p.src}" alt="${p.title||'Nail look'}"></div>`+
      (p.title?`<div class="cap">${p.title}</div>`:"");
    card.querySelector('.imgwrap').onclick=()=>openLb(i);
    const h=card.querySelector('.heart');
    h.onclick=e=>{ e.stopPropagation(); toggleFav(p.src); h.classList.toggle('on',FAVS.has(p.src)); h.classList.add('pop'); setTimeout(()=>h.classList.remove('pop'),400); $('favCount').textContent=FAVS.size?`(${FAVS.size})`:""; if(favOnly) render(); };
    board.appendChild(card); io.observe(card);
  });
}
function toggleFav(src){ FAVS.has(src)?FAVS.delete(src):FAVS.add(src); saveFavs(); }
$('favToggle').onclick=()=>{ favOnly=!favOnly; render(); window.scrollTo({top:0,behavior:'smooth'}); };

/* lightbox */
const lb=$('lb');
function openLb(i){ lbIndex=i; paintLb(); lb.classList.add('open'); }
function paintLb(){
  const p=current[lbIndex];
  $('lbImg').src=p.src; $('lbImg').alt=p.title||"";
  $('lbWho').textContent=p.title||"";
  $('lbCounter').textContent=(lbIndex+1)+" / "+current.length;
  const on=FAVS.has(p.src); const lh=$('lbHeart');
  lh.classList.toggle('on',on); lh.textContent=on?"♥ Saved":"♥ Save look";
}
function move(d){ lbIndex=(lbIndex+d+current.length)%current.length; paintLb(); }
$('lbClose').onclick=()=>lb.classList.remove('open');
$('lbPrev').onclick=()=>move(-1);
$('lbNext').onclick=()=>move(1);
$('lbHeart').onclick=()=>{ const p=current[lbIndex]; toggleFav(p.src); paintLb(); if(favOnly) render(); $('favCount').textContent=FAVS.size?`(${FAVS.size})`:""; };
lb.onclick=e=>{ if(e.target===lb) lb.classList.remove('open'); };
document.addEventListener('keydown',e=>{ if(!lb.classList.contains('open'))return; if(e.key==='Escape')lb.classList.remove('open'); if(e.key==='ArrowLeft')move(-1); if(e.key==='ArrowRight')move(1); });
let tx=0; lb.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
lb.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50)move(dx<0?1:-1); });
</script>
</body>
</html>
