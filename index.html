<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sleek Beauty Parlour — The Look Book</title>
<meta name="description" content="Our nail gallery — find your next look at Sleek Beauty Parlour." />
<meta name="theme-color" content="#52246f" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<meta property="og:title" content="Sleek Beauty Parlour — The Look Book" />
<meta property="og:description" content="Our nail gallery — find your next look." />
<meta property="og:image" content="assets/logo-white.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Dancing+Script:wght@500;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* exact palette sampled from the Sleek Beauty lotus logo */
    --purple-deep:#52246f;   /* wordmark */
    --purple:#9155ab;        /* purple petal */
    --magenta:#d0338f;       /* magenta petal */
    --orange:#ef913c;        /* golden-orange petal */
    --blue:#3585b5;          /* steel-blue petal */
    --coral:#e04b52;         /* accent between petals */
    --cream:#fffaf3; --ink:#42334f; --muted:#9a8aa8; --line:#f0e3ef;
    --grad:linear-gradient(90deg,var(--orange),var(--magenta),var(--purple),var(--blue));
    --shadow:0 12px 30px rgba(82,36,111,.13);
    --shadow-lift:0 22px 48px rgba(82,36,111,.28);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Work Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);
    min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    background:linear-gradient(135deg,#fff5f9,#fceef8,#f3ecfc,#fff3e9,#eef5fb,#fceef8);
    background-size:320% 320%;animation:bgshift 30s ease infinite;
  }
  @keyframes bgshift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px;position:relative;z-index:3}

  /* floating petals — one per logo colour */
  .petals{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
  .petal{position:absolute;bottom:-60px;opacity:0;animation:float-up linear infinite}
  @keyframes float-up{
    0%{transform:translateY(0) rotate(0);opacity:0}
    10%{opacity:.45}
    90%{opacity:.45}
    100%{transform:translateY(-115vh) rotate(360deg);opacity:0}
  }

  /* corner blooms — echo the 4-petal lotus of the logo */
  .floral{position:fixed;pointer-events:none;z-index:0;opacity:.8}
  .floral.tl{top:-40px;left:-50px;width:min(250px,38vw);transform:rotate(6deg)}
  .floral.br{bottom:-50px;right:-50px;width:min(270px,42vw);transform:rotate(188deg)}
  @media(max-width:560px){.floral{width:42vw;opacity:.6}}

  /* header */
  header{text-align:center;padding:36px 18px 8px;position:relative}
  .logo-wrap{position:relative;display:inline-block}
  header .logo{width:min(230px,58vw);height:auto;filter:drop-shadow(0 8px 16px rgba(82,36,111,.20));animation:bob 5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .spark{position:absolute;font-size:1rem;line-height:1;opacity:0;animation:twinkle 3.4s ease-in-out infinite;pointer-events:none}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.4) rotate(0)}50%{opacity:.95;transform:scale(1.15) rotate(40deg)}}
  .lookbook{
    font-family:'Fraunces',serif;font-weight:600;font-style:italic;
    font-size:clamp(2.4rem,9vw,4rem);letter-spacing:.5px;margin:8px 0 2px;
    background:linear-gradient(90deg,var(--purple-deep),var(--magenta),var(--orange),var(--blue),var(--purple),var(--purple-deep));
    background-size:250% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shimmer 8s linear infinite;
  }
  @keyframes shimmer{to{background-position:250% center}}
  .petal-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 4px}
  .petal-row::before,.petal-row::after{content:"";height:1.5px;width:70px;background:linear-gradient(90deg,transparent,var(--magenta))}
  .petal-row::after{background:linear-gradient(90deg,var(--magenta),transparent)}
  .petal-row i{width:11px;height:11px;border-radius:50% 50% 50% 4px;display:inline-block;animation:petalpulse 3s ease-in-out infinite}
  .petal-row i:nth-child(1){background:var(--orange);transform:rotate(-30deg)}
  .petal-row i:nth-child(2){background:var(--magenta);transform:rotate(-10deg);animation-delay:.3s}
  .petal-row i:nth-child(3){background:var(--purple);transform:rotate(10deg);animation-delay:.6s}
  .petal-row i:nth-child(4){background:var(--blue);transform:rotate(30deg);animation-delay:.9s}
  @keyframes petalpulse{0%,100%{transform:scale(1) rotate(var(--r,0deg))}50%{transform:scale(1.25) rotate(var(--r,0deg))}}
  .tagline{font-family:'Dancing Script',cursive;font-size:1.5rem;color:var(--purple);margin:2px 0 0}

  /* filter chips */
  .chips{
    display:flex;gap:9px;margin:22px auto 4px;padding:4px 18px 10px;max-width:100%;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:flex-start;
  }
  .chips::-webkit-scrollbar{display:none}
  @media(min-width:760px){.chips{justify-content:center;flex-wrap:wrap;overflow:visible}}
  .chip{
    flex:0 0 auto;border:1.5px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;border-radius:999px;
    padding:9px 18px;font-size:.9rem;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:7px;
    box-shadow:0 4px 14px rgba(82,36,111,.07);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease,background .22s ease,color .22s ease;
  }
  .chip .dot{width:9px;height:9px;border-radius:50% 50% 50% 3px;background:var(--c,var(--magenta));transition:background .2s ease}
  .chip:hover{transform:translateY(-2px);border-color:var(--c,var(--magenta));box-shadow:var(--shadow)}
  .chip.active{background:var(--c,var(--magenta));border-color:transparent;color:#fff;box-shadow:0 8px 20px color-mix(in srgb,var(--c,var(--magenta)) 42%,transparent)}
  .chip.active .dot{background:#fff}
  .chip.fav{color:var(--magenta)}
  .chip.fav.active{background:linear-gradient(135deg,var(--magenta),var(--orange));color:#fff}
  .chip .ct{font-weight:600;opacity:.85;font-size:.82rem}

  /* gallery */
  .board{columns:4 250px;column-gap:18px;padding:20px 4px 30px}
  @media(max-width:980px){.board{columns:3 210px}}
  @media(max-width:620px){.board{columns:2;column-gap:13px}}
  .card{
    position:relative;break-inside:avoid;margin:0 0 18px;border-radius:20px;overflow:hidden;background:#fff;
    box-shadow:var(--shadow);cursor:pointer;
    opacity:0;transform:translateY(26px) scale(.97);
    transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1),box-shadow .25s ease;
  }
  .card.in{opacity:1;transform:none}
  .card:hover{box-shadow:var(--shadow-lift);transform:translateY(-5px) rotate(-.4deg)}
  .card .imgwrap{overflow:hidden;position:relative}
  .card img{width:100%;display:block;background:linear-gradient(135deg,#fde7f1,#efe5fb);transition:transform .5s ease}
  .card:hover img{transform:scale(1.07)}
  /* shine sweep on hover */
  .card .imgwrap::after{
    content:"";position:absolute;top:0;bottom:0;left:-80%;width:55%;pointer-events:none;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.38),transparent);
    transform:skewX(-18deg);transition:none;
  }
  .card:hover .imgwrap::after{left:130%;transition:left .65s ease}
  /* always-visible service-type badge (phones can't hover) */
  .badge{
    position:absolute;left:10px;bottom:10px;z-index:2;pointer-events:none;
    display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;
    background:rgba(255,255,255,.9);backdrop-filter:blur(5px);
    font-size:.72rem;font-weight:700;letter-spacing:.04em;color:var(--c,var(--purple-deep));
    box-shadow:0 3px 10px rgba(0,0,0,.16);
  }
  .badge::before{content:"";width:7px;height:7px;border-radius:50% 50% 50% 2px;background:var(--c,var(--magenta))}
  .card .cap{
    position:absolute;left:0;right:0;bottom:0;padding:34px 14px 34px;color:#fff;
    font-family:'Dancing Script',cursive;font-size:1.12rem;letter-spacing:.02em;
    background:linear-gradient(to top,rgba(62,30,88,.85),transparent);
    transform:translateY(6px);opacity:0;transition:all .25s ease;pointer-events:none;
  }
  .card:hover .cap{opacity:1;transform:none}
  .heart{
    position:absolute;top:10px;right:10px;width:36px;height:36px;border:none;border-radius:50%;cursor:pointer;
    background:rgba(255,255,255,.88);backdrop-filter:blur(4px);display:grid;place-items:center;
    font-size:1.1rem;line-height:1;color:var(--magenta);box-shadow:0 3px 8px rgba(0,0,0,.14);
    transition:transform .15s ease,background .15s ease;z-index:2;
  }
  .heart:hover{transform:scale(1.14)}
  .heart.on{background:linear-gradient(135deg,var(--magenta),var(--orange));color:#fff}
  .heart.pop{animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.45)}100%{transform:scale(1)}}
  /* heart burst particles */
  .burst{position:absolute;top:50%;left:50%;width:6px;height:6px;pointer-events:none;font-size:.72rem;color:var(--magenta);animation:burst .6s ease-out forwards}
  @keyframes burst{
    0%{transform:translate(-50%,-50%) scale(.4);opacity:1}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.1) rotate(30deg);opacity:0}
  }
  @media (prefers-reduced-motion:reduce){
    .card{opacity:1;transform:none;transition:none}
    body,header .logo,.lookbook,.petal,.spark,.petal-row i{animation:none}
    .card .imgwrap::after{display:none}
  }

  .empty{text-align:center;color:var(--muted);padding:54px 20px;font-family:'Dancing Script',cursive;font-size:1.5rem}
  .empty strong{display:block;font-family:'Fraunces',serif;font-style:italic;color:var(--purple-deep);font-size:1.5rem;margin-bottom:6px}

  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(48,20,66,.93);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;z-index:60}
  .lb.open{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .lb-card{background:#fff;border-radius:20px;padding:12px;max-width:min(94vw,620px);box-shadow:0 30px 80px rgba(0,0,0,.55);animation:lift .3s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden}
  @keyframes lift{from{transform:scale(.9) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .lb-card img{width:100%;max-height:70vh;object-fit:contain;display:block;border-radius:12px;background:#faf3fb}
  .lb-card img.slide-l{animation:slidein-l .32s cubic-bezier(.2,.8,.2,1)}
  .lb-card img.slide-r{animation:slidein-r .32s cubic-bezier(.2,.8,.2,1)}
  @keyframes slidein-l{from{transform:translateX(46px) scale(.97);opacity:0}to{transform:none;opacity:1}}
  @keyframes slidein-r{from{transform:translateX(-46px) scale(.97);opacity:0}to{transform:none;opacity:1}}
  .lb-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 8px 4px}
  .lb-left{display:flex;flex-direction:column;gap:3px;min-width:0}
  .lb-meta .who{font-family:'Dancing Script',cursive;font-size:1.35rem;color:var(--purple-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-type{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;letter-spacing:.05em;color:var(--c,var(--purple));text-transform:uppercase}
  .lb-type::before{content:"";width:7px;height:7px;border-radius:50% 50% 50% 2px;background:var(--c,var(--magenta))}
  .lb-heart{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 16px;font-weight:700;color:var(--magenta);cursor:pointer;font-size:.92rem;white-space:nowrap;transition:transform .15s ease}
  .lb-heart:active{transform:scale(.94)}
  .lb-heart.on{background:linear-gradient(135deg,var(--magenta),var(--orange));color:#fff;border-color:transparent}
  .lb button.nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);border:none;color:#fff;font-size:2rem;width:56px;height:56px;border-radius:50%;cursor:pointer;transition:background .15s ease,transform .15s ease}
  .lb button.nav:hover{background:rgba(255,255,255,.32)}
  .lb button.nav:active{transform:translateY(-50%) scale(.92)}
  .lb .prev{left:-74px}.lb .next{right:-74px}
  @media(max-width:820px){.lb .prev{left:8px}.lb .next{right:8px}.lb button.nav{width:46px;height:46px;font-size:1.5rem;background:rgba(0,0,0,.32)}}
  .lb .close{position:fixed;top:18px;right:20px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:1.5rem;width:48px;height:48px;border-radius:50%;cursor:pointer}
  .lb .counter{position:fixed;top:24px;left:24px;color:#fff;font-size:.85rem;letter-spacing:.1em;opacity:.8}

  /* qr + footer */
  .qrband{margin:14px auto 28px;max-width:780px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;
    background:linear-gradient(135deg,#fff,#fdeef6);border:1px solid var(--line);border-radius:24px;padding:22px 28px;box-shadow:var(--shadow)}
  .qrband img{width:108px;height:108px;border-radius:12px;background:#fff;padding:6px;box-shadow:0 6px 14px rgba(82,36,111,.12)}
  .qrband .txt{text-align:left}
  .qrband .scan{font-family:'Dancing Script',cursive;color:var(--magenta);font-size:1.4rem}
  .qrband .full{font-family:'Fraunces',serif;font-style:italic;font-size:1.35rem;color:var(--purple-deep);margin:2px 0}
  .qrband .insp{color:var(--muted);font-size:.9rem}
  footer{text-align:center;padding:0 18px 38px}
  .book{display:inline-block;margin:4px 0 22px;padding:14px 34px;border-radius:999px;background:var(--grad);background-size:200% 100%;color:#fff;font-weight:700;text-decoration:none;box-shadow:var(--shadow);transition:background-position .4s ease,transform .18s ease;animation:glow 3.2s ease-in-out infinite}
  @keyframes glow{0%,100%{box-shadow:0 12px 30px rgba(208,51,143,.22)}50%{box-shadow:0 14px 38px rgba(208,51,143,.42)}}
  .book:hover{background-position:100% 0;transform:translateY(-2px)}
  .ribbon{background:var(--purple-deep);color:#fff;text-align:center;padding:15px;font-family:'Fraunces',serif;font-style:italic;letter-spacing:.12em;font-size:.95rem;position:relative;z-index:3}
  .ribbon span{color:#f2c7e0}
</style>
</head>
<body>
  <div class="petals" id="petals" aria-hidden="true"></div>
  <svg class="floral tl" viewBox="0 0 200 200" aria-hidden="true"><use href="#bloom"/></svg>
  <svg class="floral br" viewBox="0 0 200 200" aria-hidden="true"><use href="#bloom"/></svg>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <radialGradient id="pOrange" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#ffd9ad"/><stop offset="100%" stop-color="#ef913c"/></radialGradient>
    <radialGradient id="pMagenta" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#ffc3e3"/><stop offset="100%" stop-color="#d0338f"/></radialGradient>
    <radialGradient id="pPurple" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#e2c8ef"/><stop offset="100%" stop-color="#9155ab"/></radialGradient>
    <radialGradient id="pBlue" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#bfe0f2"/><stop offset="100%" stop-color="#3585b5"/></radialGradient>
    <linearGradient id="lf" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b89cdc"/><stop offset="100%" stop-color="#9155ab"/></linearGradient>
    <g id="leaf"><path d="M0,0 C18,-12 40,-10 54,6 C36,10 14,12 0,0 Z" fill="url(#lf)" opacity=".7"/></g>
    <!-- lotus bloom in the four logo petal colours -->
    <g id="bloom">
      <g transform="translate(86,150)"><use href="#leaf" transform="rotate(-150) scale(1.1)"/><use href="#leaf" transform="rotate(-110) scale(.9)"/><use href="#leaf" transform="rotate(120)"/></g>
      <g transform="translate(70,72)">
        <ellipse cx="0" cy="-34" rx="19" ry="34" fill="url(#pOrange)" transform="rotate(-52)"/>
        <ellipse cx="0" cy="-34" rx="19" ry="34" fill="url(#pMagenta)" transform="rotate(-16)"/>
        <ellipse cx="0" cy="-34" rx="19" ry="34" fill="url(#pPurple)" transform="rotate(20)"/>
        <ellipse cx="0" cy="-34" rx="19" ry="34" fill="url(#pBlue)" transform="rotate(56)"/>
        <circle r="10" fill="#f0a93e"/><circle r="5" fill="#e04b52"/>
      </g>
      <g transform="translate(124,110) scale(.72)">
        <ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pMagenta)" transform="rotate(-40)"/>
        <ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pOrange)" transform="rotate(-2)"/>
        <ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pBlue)" transform="rotate(36)"/>
        <ellipse cx="0" cy="-34" rx="19" ry="33" fill="url(#pPurple)" transform="rotate(74)"/>
        <circle r="10" fill="#f0a93e"/><circle r="5" fill="#e04b52"/>
      </g>
    </g>
  </defs></svg>

  <header>
    <div class="wrap">
      <div class="logo-wrap">
        <img class="logo" src="assets/logo.png?v=2" alt="Sleek Beauty Parlour" />
        <span class="spark" style="top:6%;left:-10%;color:var(--orange)">✦</span>
        <span class="spark" style="top:2%;right:-8%;color:var(--magenta);animation-delay:1.1s">✦</span>
        <span class="spark" style="bottom:34%;left:-16%;color:var(--blue);animation-delay:2s;font-size:.8rem">✦</span>
        <span class="spark" style="bottom:26%;right:-14%;color:var(--purple);animation-delay:.6s;font-size:.8rem">✦</span>
      </div>
      <h1 class="lookbook">Our Inspos 💅</h1>
      <div class="petal-row" aria-hidden="true"><i style="--r:-30deg"></i><i style="--r:-10deg"></i><i style="--r:10deg"></i><i style="--r:30deg"></i></div>
      <p class="tagline">Real nails. Real results. Real you.</p>
    </div>
  </header>

  <div class="wrap">
    <div class="chips" id="chips" role="tablist" aria-label="Filter looks"></div>
    <div class="board" id="board"></div>
    <p class="empty" id="empty" style="display:none"></p>

    <div class="qrband">
      <img src="qr/sleek-lookbook-qr.png" alt="Scan QR" />
      <div class="txt">
        <div class="scan">Scan to explore</div>
        <div class="full">our full Nail Gallery</div>
        <div class="insp">Inspiration for your next look ❤</div>
      </div>
    </div>
    <footer><a class="book" id="bookBtn" href="#">Book your appointment</a></footer>
  </div>

  <div class="ribbon">SLEEK BEAUTY PARLOUR <span>•</span> NAILS THAT SPEAK ELEGANCE</div>

  <div class="lb" id="lb">
    <div class="counter" id="lbCounter"></div>
    <button class="close" id="lbClose" aria-label="Close">×</button>
    <button class="nav prev" id="lbPrev" aria-label="Previous">‹</button>
    <div class="lb-card">
      <img id="lbImg" src="" alt="" />
      <div class="lb-meta">
        <div class="lb-left">
          <span class="lb-type" id="lbType"></span>
          <span class="who" id="lbWho"></span>
        </div>
        <button class="lb-heart" id="lbHeart">♥ Save look</button>
      </div>
    </div>
    <button class="nav next" id="lbNext" aria-label="Next">›</button>
  </div>

<script>
const $ = id => document.getElementById(id);
let PHOTOS=[], CONFIG={}, current=[], lbIndex=0, filter="all";
const FAVS=new Set(JSON.parse(localStorage.getItem("sleek_favs")||"[]"));
const saveFavs=()=>localStorage.setItem("sleek_favs",JSON.stringify([...FAVS]));

/* logo petal colours cycled across service types */
const PETALS=["var(--orange)","var(--magenta)","var(--purple)","var(--blue)","var(--coral)"];
const typeColor={}; // type -> colour, assigned in data order
const colorOf=t=>typeColor[t]||"var(--magenta)";
const typeOf=p=>p.type||p.service||"";

/* floating petals in the four logo colours */
(function makePetals(){
  const box=$('petals'); const colors=["#ef913c","#d0338f","#9155ab","#3585b5"];
  for(let i=0;i<10;i++){
    const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
    s.setAttribute("viewBox","-20 -34 40 40"); s.classList.add("petal");
    const sz=14+Math.random()*22;
    s.style.width=sz+"px"; s.style.left=(Math.random()*100)+"vw";
    s.style.animationDuration=(16+Math.random()*16)+"s";
    s.style.animationDelay=(-Math.random()*22)+"s";
    s.innerHTML=`<ellipse cx="0" cy="-16" rx="9" ry="16" fill="${colors[i%colors.length]}" opacity="0.8"/>`;
    box.appendChild(s);
  }
})();

const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
},{rootMargin:"0px 0px -8% 0px"});

fetch('photos.json?v='+Date.now())
  .then(r=>r.ok?r.json():Promise.reject())
  .then(d=>{
    PHOTOS=(d.photos||[]).filter(p=>p.src); CONFIG=d.config||{};
    if(CONFIG.bookingUrl) $('bookBtn').href=CONFIG.bookingUrl; else $('bookBtn').style.display='none';
    [...new Set(PHOTOS.map(typeOf).filter(Boolean))].forEach((t,i)=>typeColor[t]=PETALS[i%PETALS.length]);
    buildChips(); render();
  })
  .catch(()=>{ $('empty').style.display='block'; $('empty').innerHTML='<strong>Coming soon</strong>Our nail gallery is being set up 💅'; });

function buildChips(){
  const box=$('chips'); box.innerHTML="";
  const mk=(key,label,color,extra="")=>{
    const b=document.createElement('button');
    b.className='chip'+extra; b.dataset.key=key;
    if(color) b.style.setProperty('--c',color);
    b.innerHTML=(extra?'<span>♥</span> ':'<span class="dot"></span>')+label+(key==='fav'?' <span class="ct" id="favCount"></span>':'');
    b.onclick=()=>{ filter=key; render(); };
    box.appendChild(b);
  };
  mk('all','All','var(--purple-deep)');
  Object.keys(typeColor).forEach(t=>mk(t,t,typeColor[t]));
  mk('fav','Favourites',null,' fav');
}

function render(){
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.key===filter));
  const fc=$('favCount'); if(fc) fc.textContent=FAVS.size?`(${FAVS.size})`:"";
  current = filter==='fav' ? PHOTOS.filter(p=>FAVS.has(p.src))
          : filter==='all' ? PHOTOS
          : PHOTOS.filter(p=>typeOf(p)===filter);
  const board=$('board'), empty=$('empty'); board.innerHTML="";
  if(!current.length){
    empty.style.display="block";
    empty.innerHTML = filter==='fav' ? '<strong>No saved looks yet</strong>Tap the ♥ on any photo to save it here.'
                                     : '<strong>Coming soon</strong>New looks on the way 💕';
    return;
  }
  empty.style.display="none";
  current.forEach((p,i)=>{
    const t=typeOf(p), col=colorOf(t);
    const card=document.createElement('div'); card.className='card';
    card.style.transitionDelay=(Math.min(i,12)*0.04)+'s';
    card.innerHTML =
      `<button class="heart ${FAVS.has(p.src)?'on':''}" aria-label="Save">♥</button>`+
      `<div class="imgwrap"><img loading="lazy" src="${p.src}" alt="${p.title||'Nail look'}"></div>`+
      (t?`<span class="badge" style="--c:${col}">${t}</span>`:"")+
      (p.title?`<div class="cap">${p.title}</div>`:"");
    card.onclick=()=>openLb(i);
    const h=card.querySelector('.heart');
    h.onclick=e=>{
      e.stopPropagation(); toggleFav(p.src);
      const on=FAVS.has(p.src);
      h.classList.toggle('on',on); h.classList.add('pop'); setTimeout(()=>h.classList.remove('pop'),400);
      if(on) heartBurst(h);
      const fc2=$('favCount'); if(fc2) fc2.textContent=FAVS.size?`(${FAVS.size})`:"";
      if(filter==='fav') render();
    };
    board.appendChild(card); io.observe(card);
  });
}
function heartBurst(el){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  for(let i=0;i<6;i++){
    const s=document.createElement('span'); s.className='burst'; s.textContent='♥';
    const a=(i/6)*Math.PI*2+Math.random()*.5, r=26+Math.random()*16;
    s.style.setProperty('--dx',Math.cos(a)*r+'px'); s.style.setProperty('--dy',Math.sin(a)*r+'px');
    if(i%2) s.style.color='var(--orange)';
    el.appendChild(s); setTimeout(()=>s.remove(),650);
  }
}
function toggleFav(src){ FAVS.has(src)?FAVS.delete(src):FAVS.add(src); saveFavs(); }

/* lightbox */
const lb=$('lb');
function openLb(i){ lbIndex=i; paintLb(); lb.classList.add('open'); }
function paintLb(dir){
  const p=current[lbIndex], img=$('lbImg');
  img.classList.remove('slide-l','slide-r'); void img.offsetWidth;
  if(dir) img.classList.add(dir>0?'slide-l':'slide-r');
  img.src=p.src; img.alt=p.title||"";
  $('lbWho').textContent=p.title||"";
  const t=typeOf(p), lt=$('lbType');
  lt.textContent=t; lt.style.setProperty('--c',colorOf(t)); lt.style.display=t?'':'none';
  $('lbCounter').textContent=(lbIndex+1)+" / "+current.length;
  const on=FAVS.has(p.src); const lh=$('lbHeart');
  lh.classList.toggle('on',on); lh.textContent=on?"♥ Saved":"♥ Save look";
  /* preload neighbours for instant swipes */
  [1,-1].forEach(d=>{ const n=current[(lbIndex+d+current.length)%current.length]; if(n) (new Image()).src=n.src; });
}
function move(d){ lbIndex=(lbIndex+d+current.length)%current.length; paintLb(d); }
$('lbClose').onclick=()=>lb.classList.remove('open');
$('lbPrev').onclick=()=>move(-1);
$('lbNext').onclick=()=>move(1);
$('lbHeart').onclick=()=>{ const p=current[lbIndex]; toggleFav(p.src); paintLb(); if(filter==='fav'){ render(); if(!current.length) lb.classList.remove('open'); } const fc=$('favCount'); if(fc) fc.textContent=FAVS.size?`(${FAVS.size})`:""; };
lb.onclick=e=>{ if(e.target===lb) lb.classList.remove('open'); };
document.addEventListener('keydown',e=>{ if(!lb.classList.contains('open'))return; if(e.key==='Escape')lb.classList.remove('open'); if(e.key==='ArrowLeft')move(-1); if(e.key==='ArrowRight')move(1); });
let tx=0; lb.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
lb.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50)move(dx<0?1:-1); });
</script>
</body>
